name               = "zoom-sms"
main               = "worker.js"
compatibility_date = "2024-09-23"
workers_dev        = false

# ── Secrets (set via `wrangler secret put`, never store values here) ──────────
# wrangler secret put ZOOM_ACCOUNT_ID
# wrangler secret put ZOOM_CLIENT_ID
# wrangler secret put ZOOM_CLIENT_SECRET

# ── Vars (non-sensitive config — edit here and redeploy) ──────────────────────
[vars]
# Work item types — find the IDs in ZCC Admin > Preferences > Work Item Types.
# Replace each REPLACE_ID_* with the real ID, and update the names to match.
WORK_ITEM_TYPES = '[{"id":"X1iDdZYITZySqQWTB4IKjg","name":"Work item"},{"id":"yWsvUl9CRemw1rCEWBkndg","name":"Order Confirmation"},{"id":"KSuqmSasSlC9uSSlgj2K-A","name":"Service Issue"},{"id":"owpze-6pSqm2ntQGAoRPBQ","name":"Delivery Update"}]'

# Work item flows — ZCC doesn't return Entry IDs via the flows API for work_item channel.
# Get the Entry ID from ZCC Admin > Contact Center Management > Preferences > Entry ID.
# Format: [{"entryId":"...","label":"Flow Name","flowId":"..."}]
WORK_ITEM_FLOWS = '[{"entryId":"YXTDVVrETQ6OAfjnGld-0Q","label":"Email Sender","flowId":"Vt0kUZVpTGefXPTpURrrsQ"}]'

# ── Routes (inline array — avoids Wrangler 4.x multi-block issues) ────────────
# Specific paths only — does NOT touch api.eno.solutions/zoom/ or anything else.
[[routes]]
pattern = "api.eno.solutions/sms*"
zone_id = "9bbf547f8e3443ec64e9f41b1f998095"

[[routes]]
pattern = "api.eno.solutions/email*"
zone_id = "9bbf547f8e3443ec64e9f41b1f998095"
